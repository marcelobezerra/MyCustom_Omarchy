[Service]
# Usa cópia do binário sem file-capabilities para permitir LD_PRELOAD.
# Necessário porque ipv6.disable=1 no kernel impede socket(AF_INET6).
# O shim intercepta chamadas AF_INET6 e as redireciona para AF_INET.
ExecStart=
ExecStart=/home/richthofen/.local/bin/wivrn-server-ipv4
Environment="LD_PRELOAD=/home/richthofen/.local/lib/wivrn_ipv4_shim.so"
