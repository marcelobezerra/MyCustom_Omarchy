general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 15 minutes; also starts a 45-min background timer to turn off monitors
listener {
    timeout = 900
    on-timeout = ~/.config/hypr/screensaver-start.sh
    on-resume = ~/.config/hypr/screensaver-stop.sh
}

# Fallback: turn off monitors after 60 minutes (in case screensaver doesn't reset idle timer)
listener {
    timeout = 3600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
